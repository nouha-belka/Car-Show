<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Show | Car Index</title>
</head>
<body>
    <div th:object="${listOfCars}">
        <div th:each="car : ${listOfCars}">
            <h3 th:text="|${car.make()} ${car.model()}|"></h3>
            <h5 th:text="|Door Count ${car.doorCount()}|"></h5>
            <h5 th:text="|Engine Type ${car.engineType()}|"></h5>
            <h6 th:text="|Vehicle Type ${car.vehicleType()}|"></h6>
        </div>

    </div>
</body>
</html>

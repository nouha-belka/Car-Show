<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Show | Owner Form</title>
    <style>
        .error-message {
            color: red;
            font-size: 0.9em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input.error, select.error {
            border-color: red;
            background-color: #ffe6e6;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Create New Owner</h1>
    
    <form th:action="@{/owner/create}" th:object="${newOwner}" method="post">
        <input type="hidden" name="id" id="id" th:field="*{ownerId}">
        
        <!-- First Name Field -->
        <div class="form-group">
            <label for="firstName">First Name:</label>
            <input type="text" name="firstName" id="firstName" th:field="*{firstName}" 
                   placeholder="Enter first name"
                   th:classappend="${#fields.hasErrors('firstName') ? 'error' : ''}">
            <span class="error-message" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
        </div>
        
        <!-- Last Name Field -->
        <div class="form-group">
            <label for="lastName">Last Name:</label>
            <input type="text" name="lastName" id="lastName" th:field="*{lastName}" 
                   placeholder="Enter last name"
                   th:classappend="${#fields.hasErrors('lastName') ? 'error' : ''}">
            <span class="error-message" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
        </div>
        
        <!-- Gender Field -->
        <div class="form-group">
            <label for="gender">Gender:</label>
            <select name="gender" id="gender" th:field="*{gender}" 
                    th:classappend="${#fields.hasErrors('gender') ? 'error' : ''}">
                <option value="">-- Select Gender --</option>
                <option th:each="g : ${genders}" th:value="${g.name()}" th:text="${g.getName()}"></option>
            </select>
            <span class="error-message" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></span>
        </div>
        
        <!-- Date of Birth Field -->
        <div class="form-group">
            <label for="dateOfBirth">Date of Birth:</label>
            <input type="date" name="dateOfBirth" id="dateOfBirth" th:field="*{dateOfBirth}" 
                   th:classappend="${#fields.hasErrors('dateOfBirth') ? 'error' : ''}">
            <span class="error-message" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></span>
        </div>
        
        <!-- Submit Button -->
        <button type="submit">Create Owner</button>
    </form>
    
    <hr>
    <a th:href="@{/owner}">Back to Owners List</a>
</body>
</html>
